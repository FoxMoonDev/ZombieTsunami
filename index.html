<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🧟 Zombie Tsunami</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="screen-start" class="screen active">
  <div class="card">
    <div class="logo-wrap">
      <span class="logo-emoji">🧟</span>
      <h1>ZOMBIE<br><span class="green">TSUNAMI</span></h1>
      <p class="sub">Cresça a horda. Sobreviva.</p>
    </div>
    <div class="controls-hint">
      <span><kbd>ESPAÇO</kbd> ou clique — pular</span>
      <span><kbd>P</kbd> — pausar</span>
    </div>
    <button class="btn-primary" id="btn-start">▶ JOGAR</button>
    <p class="record-line">Recorde: <b id="start-best">0</b> · Moedas: <b id="start-coins">0</b></p>
  </div>
</div>

<div id="screen-pause" class="screen">
  <div class="card">
    <h2>⏸ PAUSADO</h2>
    <button class="btn-primary"   id="btn-resume">▶ CONTINUAR</button>
    <button class="btn-secondary" id="btn-shop-pause">🛒 LOJA</button>
    <button class="btn-secondary" id="btn-restart-pause">↺ REINICIAR</button>
  </div>
</div>

<div id="screen-gameover" class="screen">
  <div class="card">
    <div class="go-icon">💀</div>
    <h2>FIM DE JOGO</h2>
    <div class="results">
      <div class="row"><span>Distância</span><b id="go-score">0</b></div>
      <div class="row"><span>Zumbis criados</span><b id="go-eaten">0</b></div>
      <div class="row"><span>Moedas ganhas</span><b id="go-coins">0</b></div>
      <div class="row highlight"><span>Recorde</span><b id="go-best">0</b><span id="go-new" class="new-badge hidden">NOVO!</span></div>
    </div>
    <button class="btn-primary"   id="btn-restart">↺ JOGAR NOVAMENTE</button>
    <button class="btn-secondary" id="btn-shop-go">🛒 LOJA</button>
    <button class="btn-secondary" id="btn-menu">⌂ MENU</button>
  </div>
</div>

<div id="screen-shop" class="screen">
  <div class="card wide">
    <h2>🛒 LOJA</h2>
    <p class="shop-coins">💰 <span id="shop-coins">0</span> moedas</p>
    <div id="shop-grid"></div>
    <button class="btn-secondary" id="btn-shop-close">✖ FECHAR</button>
  </div>
</div>

<div id="hud">
  <div class="hud-group">
    <div class="hud-item"><span class="lbl">HORDA</span><span id="h-horde" class="val green">1</span></div>
    <div class="hud-item"><span class="lbl">DIST</span><span id="h-score" class="val">0</span></div>
  </div>
  <div id="bonus-bar" class="hidden"></div>
  <div class="hud-group">
    <div class="hud-item"><span class="lbl">🧠</span><span id="h-brains" class="val red">0</span></div>
    <div class="hud-item"><span class="lbl">💰</span><span id="h-coins" class="val gold">0</span></div>
    <button id="btn-pause-hud">⏸</button>
  </div>
</div>

<div id="game">
  <div id="sky">
    <div id="moon"></div>
    <div id="stars"></div>
    <div id="clouds"></div>
  </div>
  <div id="city"></div>
  <div id="ground"><div id="ground-line"></div><div id="ground-fill"></div></div>
  <div id="holes"></div>
  <div id="world"></div>
  <div id="horde"></div>
  <div id="fx"></div>
  <div id="bonus-vfx"></div>
</div>

<div id="toast" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
